# Ablation Grid Reference
# -----------------------
# This file documents the full parameter space for the ablation studies.
# It is NOT directly executed — pass it to ablation.py or use run_study_group().
#
# Usage:
#   from experiments.ablation import run_study_group
#   run_study_group("A")   # sampling group
#   run_study_group("F")   # cost optimization group
#
# Or via CLI (future):
#   python -m experiments.ablation --group F


# ── Study Group A: Sampling Parameters ──────────────────────────────────────
# Goal: understand how stochasticity affects output quality and consistency.
# temperature=0.0 is fully deterministic. Higher values introduce variance.
# top_p (nucleus sampling) and top_k (vocabulary restriction) only matter
# when temperature > 0. Sweep all three jointly.
# Total combinations: 3 × 3 × 3 = 27
#
group_A:
  axes:
    temperature: [0.0, 0.3, 0.7]
    top_p:       [null, 0.85, 0.95]
    top_k:       [null, 20, 40]
  fixed:
    n_votes: 3
    vote_policy: any
    binary_prompt_variant: default
    confidence_threshold: 0.0
  notes: >
    key_metric: binary_f1, binary_recall, latency_s.
    At temperature=0.0 with n_votes=3, all votes are identical — useful
    to establish a deterministic baseline before introducing variance.


# ── Study Group B: Ensemble Voting ───────────────────────────────────────────
# Goal: does voting improve reliability? What policy maximizes F1?
# Temperature must be > 0 for votes to differ from each other.
# "any"      → incident if ANY vote is True  → maximizes recall
# "majority" → incident if >50% True         → balanced
# "all"      → incident if ALL votes True    → maximizes precision
# Total combinations: 1 × 3 × 3 = 9
#
group_B:
  axes:
    temperature: [0.3]
    n_votes:     [1, 3, 5]
    vote_policy: [any, majority, all]
  fixed:
    binary_prompt_variant: default
    confidence_threshold: 0.0
  notes: >
    n_votes=1 is cheapest; n_votes=5 is most stable.
    Compare cost × recall to find the sweet spot.


# ── Study Group C: Prompt Engineering ────────────────────────────────────────
# Goal: does prompt framing matter for detection quality?
# Binary prompt variants:
#   default     → balanced: flag any physical consequence
#   strict      → conservative: only flag clear physical harm
#   high_recall → aggressive: flag anything ambiguous (bias toward recall)
# Classification prompt variants:
#   default     → standard category list
#   structured  → decomposed component-by-component classification
# Total combinations: 3 × 2 = 6
#
group_C:
  axes:
    binary_prompt_variant:         [default, strict, high_recall]
    classification_prompt_variant: [default, structured]
  fixed:
    temperature: 0.1
    n_votes: 3
    vote_policy: any
    confidence_threshold: 0.0
  notes: >
    key_metric: binary_f1, macro_f1, binary_recall, binary_precision.
    Strict prompt expected to improve precision but reduce recall.
    high_recall prompt expected to improve recall at cost of precision.


# ── Study Group D: Confidence Threshold (Stage 2 Gating) ─────────────────────
# Goal: can we reduce Stage 2 call cost by skipping low-confidence Stage 1 positives?
# threshold=0.0 → run Stage 2 on every Stage 1 positive (no gating)
# threshold=0.5 → skip Stage 2 if Stage 1 confidence < 0.5
# threshold=0.7 → aggressively gate — only classify very confident positives
# Key tradeoff: cost savings vs. recall loss on borderline detections.
# Total combinations: 5 × 2 = 10
#
group_D:
  axes:
    confidence_threshold:    [0.0, 0.4, 0.5, 0.6, 0.7]
    binary_prompt_variant:   [default, high_recall]
  fixed:
    temperature: 0.1
    n_votes: 3
    vote_policy: any
  notes: >
    key_metric: binary_recall (must stay high), cost_per_video.
    Expect recall to drop as threshold rises. Find min cost where recall >= 0.95.


# ── Study Group E: Model Selection ───────────────────────────────────────────
# Goal: is a more capable Stage 2 model worth the cost?
# Is a cheaper Stage 1 model viable as a detector?
# gemini-2.0-flash-lite: fastest and cheapest
# gemini-2.5-flash:      balanced (current default)
# gemini-2.5-pro:        most capable, highest cost
# Total combinations: 2 × 2 = 4
#
group_E:
  axes:
    stage1_model: [gemini-2.5-flash, gemini-2.0-flash-lite]
    model:        [gemini-2.5-flash, gemini-2.5-pro]
  fixed:
    binary_prompt_variant: default
    temperature: 0.1
    n_votes: 3
    vote_policy: any
    confidence_threshold: 0.0
  notes: >
    key_metric: binary_recall (for stage1_model), macro_f1 (for model), cost_per_video.
    Flash-Lite as Stage 1 reduces cost significantly — acceptable if recall doesn't drop.
    Pro as Stage 2 improves multiclass accuracy but ~5-10× cost increase.


# ── Study Group F: Cost Optimization — High-Recall Cheap Gate ─────────────────
# Goal: exploit class imbalance (~99% no-accident) to minimize API cost.
# Strategy:
#   Stage 1: cheap model (Flash-Lite) + high-recall prompt → catches all accidents
#   Stage 2: only runs on Stage 1 positives (~1% of videos in real deployment)
# This study tests whether Flash-Lite can serve as a reliable safety net.
# Total combinations: 2 × 2 × 2 = 8
#
group_F:
  axes:
    stage1_model:          [gemini-2.0-flash-lite, gemini-2.5-flash]
    confidence_threshold:  [0.0, 0.3]
    n_votes:               [1, 3]
  fixed:
    binary_prompt_variant: high_recall
    model: gemini-2.5-flash
    temperature: 0.0
    vote_policy: any
  notes: >
    CRITICAL metric: Stage 1 recall must remain near 1.0.
    Secondary metric: cost_per_video (target < 50% of baseline attempt1 cost).
    n_votes=1 with Flash-Lite is the cheapest possible Stage 1 config.


# ── Parameter Reference ──────────────────────────────────────────────────────
# Full list of all supported config keys:

all_parameters:
  # Model
  model:                      gemini-2.5-flash   # Stage 2 (classify) model
  stage1_model:               gemini-2.5-flash   # Stage 1 (detect) model; defaults to model

  # Prompts
  binary_prompt_variant:      default            # default | strict | high_recall
  classification_prompt_variant: default         # default | structured

  # Sampling
  temperature:                0.1                # 0.0 = deterministic; >0 = stochastic
  top_p:                      null               # nucleus sampling (null = API default)
  top_k:                      null               # vocab restriction (null = API default)

  # Ensemble
  n_votes:                    3                  # Stage 1 votes; higher = more stable
  vote_policy:                any                # any | majority | all

  # Gating
  confidence_threshold:       0.0               # Min Stage 1 confidence to run Stage 2

  # Frame fallback
  use_frame_fallback:         false              # Extract frames when video API fails
  frame_fallback_fps:         2.0
  frame_fallback_max_frames:  10

  # Data
  spreadsheet_source:         data/dataset_mapping.xlsx
  local_videos_dir:           data/videos
  originals_only:             true               # false = include type1/ and type2/ augmented
  sleep_between_videos:       1.0               # seconds between API calls

  outputs_dir:                outputs
